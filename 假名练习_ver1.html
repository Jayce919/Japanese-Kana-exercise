<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五十音练习工具 - Minimalist Japanese (ver.1)</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1d1d1f;
            --border-color: #d2d2d7;
            --correct-bg: #eafaf1;
            --correct-color: #27ae60;
            --wrong-bg: #fdecea;
            --wrong-color: #eb5757;
            --accent-color: #0071e3;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 600px;
            background: var(--bg-color);
            padding: 40px 24px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .container.is-correct { background-color: var(--correct-bg); }
        .container.is-wrong { background-color: var(--wrong-bg); }

        #kana-display {
            font-size: 110px;
            font-weight: 600;
            margin: 20px 0;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-group {
            margin: 30px 0;
            position: relative;
        }

        input[type="text"] {
            font-size: 28px;
            padding: 12px 20px;
            width: 100%;
            max-width: 200px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            outline: none;
            text-align: center;
            transition: all 0.2s;
            background: transparent;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }

        #feedback {
            height: 30px;
            margin-top: 10px;
            font-size: 18px;
            font-weight: 500;
        }
        #feedback.correct { color: var(--correct-color); }
        #feedback.wrong { color: var(--wrong-color); }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 12px; color: #86868b; margin-bottom: 4px; }
        .stat-value { font-size: 18px; font-weight: 600; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            font-size: 14px;
        }

        .filter-section {
            width: 100%;
            padding: 15px;
            background: #fafafa;
            border-radius: var(--radius);
            margin-bottom: 10px;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 8px;
        }

        label {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 6px;
            accent-color: var(--accent-color);
        }

        .btn {
            padding: 10px 24px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .btn-primary { background: var(--accent-color); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); }
        .btn:active { opacity: 0.7; }

        @media (max-width: 480px) {
            #kana-display { font-size: 90px; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-label">已做</span>
            <span id="stat-total" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">正确</span>
            <span id="stat-correct" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">正确率</span>
            <span id="stat-ratio" class="stat-value">0%</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">连胜</span>
            <span id="stat-streak" class="stat-value">0</span>
        </div>
    </div>

    <div id="kana-display">--</div>

    <div class="input-group">
        <input type="text" id="user-input" autocomplete="off" placeholder="输入罗马音" autofocus>
        <div id="feedback"></div>
    </div>

    <div style="display: flex; justify-content: center; gap: 10px;">
        <button class="btn btn-primary" onclick="submitAnswer()">确认</button>
        <button class="btn btn-outline" onclick="nextQuestion()">跳过</button>
    </div>

    <div class="controls">
        <div class="filter-section">
            <div class="checkbox-group">
                <label><input type="checkbox" id="chk-hira" checked> 平假名</label>
                <label><input type="checkbox" id="chk-kata"> 片假名</label>
            </div>
            <div class="checkbox-group" style="margin-top: 15px;">
                <label><input type="checkbox" id="chk-seion" checked> 清音</label>
                <label><input type="checkbox" id="chk-daku"> 浊/半浊</label>
                <label><input type="checkbox" id="chk-youon"> 拗音</label>
            </div>
        </div>

        <div style="display: flex; align-items: center; gap: 20px; width: 100%; justify-content: center;">
            <label>
                <input type="checkbox" id="chk-mistake-mode"> 只练错题 (<span id="wrong-count">0</span>)
            </label>
            <button class="btn btn-outline" style="font-size: 12px; padding: 5px 12px;" onclick="resetStats()">重置统计</button>
        </div>
    </div>
</div>

    { kana: "リャ", romaji: "rya", type: "katakana", group: "youon" }, { kana: "リュ", romaji: "ryu", type: "katakana", group: "youon" }, { kana: "リョ", romaji: "ryo", type: "katakana", group: "youon" },
    { kana: "ギャ", romaji: "gya", type: "katakana", group: "youon" }, { kana: "ギュ", romaji: "gyu", type: "katakana", group: "youon" }, { kana: "ギョ", romaji: "gyo", type: "katakana", group: "youon" },
    { kana: "ジャ", romaji: "ja",  type: "katakana", group: "youon" }, { kana: "ジュ", romaji: "ju",  type: "katakana", group: "youon" }, { kana: "ジョ", romaji: "jo",  type: "katakana", group: "youon" },
    { kana: "ビャ", romaji: "bya", type: "katakana", group: "youon" }, { kana: "ビュ", romaji: "byu", type: "katakana", group: "youon" }, { kana: "ビョ", romaji: "byo", type: "katakana", group: "youon" },
    { kana: "ピャ", romaji: "pya", type: "katakana", group: "youon" }, { kana: "ピュ", romaji: "pyu", type: "katakana", group: "youon" }, { kana: "ピョ", romaji: "pyo", type: "katakana", group: "youon" }
];

let currentKana = null;
let filteredPool = [];
let wrongList = [];
let stats = { total: 0, correct: 0, streak: 0 };
let isLock = false;

const els = {
    display: document.getElementById('kana-display'),
    input: document.getElementById('user-input'),
    feedback: document.getElementById('feedback'),
    card: document.getElementById('main-card'),
    total: document.getElementById('stat-total'),
    correct: document.getElementById('stat-correct'),
    ratio: document.getElementById('stat-ratio'),
    streak: document.getElementById('stat-streak'),
    wrongCount: document.getElementById('wrong-count')
};

function init() {
    updatePool();
    nextQuestion();

    els.input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitAnswer();
    });

    document.querySelectorAll('input[type="checkbox"]').forEach(el => {
        el.addEventListener('change', () => {
            if (el.id === 'chk-mistake-mode') {
                updatePool();
                nextQuestion();
            } else {
                updatePool();
            }
        });
    });
}

function updatePool() {
    const useHira = document.getElementById('chk-hira').checked;
    const useKata = document.getElementById('chk-kata').checked;
    const useSeion = document.getElementById('chk-seion').checked;
    const useDaku = document.getElementById('chk-daku').checked;
    const useYouon = document.getElementById('chk-youon').checked;
    const mistakeMode = document.getElementById('chk-mistake-mode').checked;

    if (mistakeMode) {
        filteredPool = [...new Set(wrongList)];
    } else {
        filteredPool = DATA.filter(item => {
            const typeMatch = (useHira && item.type === 'hiragana') || (useKata && item.type === 'katakana');
            const groupMatch = (useSeion && item.group === 'seion') || (useDaku && item.group === 'daku') || (useYouon && item.group === 'youon');
            return typeMatch && groupMatch;
        });
    }

    els.wrongCount.innerText = [...new Set(wrongList)].length;
}

function nextQuestion() {
    if (filteredPool.length === 0) {
        els.display.innerText = "空";
        els.feedback.innerText = "请至少选择一个分类";
        return;
    }

    isLock = false;
    els.card.className = "container";
    els.feedback.innerText = "";
    els.input.value = "";
    els.input.focus();

    let next;
    do {
        next = filteredPool[Math.floor(Math.random() * filteredPool.length)];
    } while (next === currentKana && filteredPool.length > 1);

    currentKana = next;
    els.display.innerText = currentKana.kana;
}

function submitAnswer() {
    if (isLock || !currentKana) return;
    isLock = true;

    speak(currentKana.kana);

    const userVal = els.input.value.trim().toLowerCase();
    const isCorrect = userVal === currentKana.romaji;

    stats.total++;

    if (isCorrect) {
        stats.correct++;
        stats.streak++;
        els.card.classList.add('is-correct');
        els.feedback.innerText = "正确！";
        els.feedback.className = "correct";
    } else {
        stats.streak = 0;
        wrongList.push(currentKana);
        els.card.classList.add('is-wrong');
        els.feedback.innerText = `错误，答案是: ${currentKana.romaji}`;
        els.feedback.className = "wrong";
        els.wrongCount.innerText = [...new Set(wrongList)].length;
    }

    updateStatsUI();
    setTimeout(nextQuestion, 450);
}

function updateStatsUI() {
    els.total.innerText = stats.total;
    els.correct.innerText = stats.correct;
    els.streak.innerText = stats.streak;
    const rate = stats.total === 0 ? 0 : Math.round((stats.correct / stats.total) * 100);
    els.ratio.innerText = rate + "%";
}

function resetStats() {
    stats = { total: 0, correct: 0, streak: 0 };
    wrongList = [];
    updateStatsUI();
    els.wrongCount.innerText = 0;
    nextQuestion();
}

function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'ja-JP';
    msg.rate = 1.1;
    window.speechSynthesis.speak(msg);
}

init();
</script>
</body>
</html>
