<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>标日初级单词背诵</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1d1d1f;
            --border: #d2d2d7;
            --correct-bg: #eafaf1;
            --correct-color: #27ae60;
            --wrong-bg: #fdecea;
            --wrong-color: #eb5757;
            --accent: #0071e3;
            --accent-light: rgba(0,113,227,0.08);
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 14px;
            --gray: #86868b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f5f7;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 0;
        }
        .app {
            width: 95%;
            max-width: 620px;
            background: var(--bg);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 32px 24px;
            transition: background-color 0.3s;
            margin: 0 auto;
        }
        .app.is-correct { background-color: var(--correct-bg); }
        .app.is-wrong { background-color: var(--wrong-bg); }
        .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; padding-bottom: 18px; border-bottom: 1px solid #eee; margin-bottom: 16px; }
        .stat { text-align: center; }
        .stat-label { font-size: 11px; color: var(--gray); margin-bottom: 2px; }
        .stat-val { font-size: 20px; font-weight: 700; }
        .lesson-section {
            background: #fafafa;
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 16px;
        }
        .lesson-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .lesson-header h3 { font-size: 14px; font-weight: 600; }
        .lesson-select-all {
            font-size: 12px; color: var(--accent); cursor: pointer; border: none; background: none;
            padding: 2px 8px; border-radius: 12px;
        }
        .lesson-select-all:hover { background: var(--accent-light); }
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 6px;
            max-height: 180px;
            overflow-y: auto;
        }
        .lesson-grid label {
            display: flex; align-items: center; gap: 4px;
            font-size: 12px; cursor: pointer; user-select: none;
            padding: 4px 6px; border-radius: 8px; transition: background 0.15s;
        }
        .lesson-grid label:hover { background: var(--accent-light); }
        .lesson-grid input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent); flex-shrink: 0; }
        .quiz { text-align: center; padding: 10px 0; }
        .chinese-display {
            font-size: 38px;
            font-weight: 600;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            line-height: 1.3;
            margin: 8px 0;
        }
        .answer-display {
            font-size: 26px;
            min-height: 40px;
            color: var(--text);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .type-display {
            font-size: 14px;
            color: var(--gray);
            min-height: 22px;
            margin-bottom: 10px;
        }
        .input-group { margin: 20px 0; }
        .input-group input {
            font-size: 26px;
            padding: 12px 16px;
            width: 90%;
            max-width: 260px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            text-align: center;
            transition: all 0.2s;
            background: transparent;
        }
        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.1);
        }
        .feedback {
            height: 28px;
            margin-top: 6px;
            font-size: 16px;
            font-weight: 500;
        }
        .feedback.correct { color: var(--correct-color); }
        .feedback.wrong { color: var(--wrong-color); }
        .btn-row { display: flex; justify-content: center; gap: 12px; margin-top: 18px; }
        .btn {
            padding: 10px 32px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); }
        .btn-success { background: var(--correct-color); color: #fff; }
        .btn:disabled { opacity: 0.4; cursor: default; }
        .controls { margin-top: 20px; padding-top: 16px; border-top: 1px solid #eee; }
        .control-row {
            display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center;
        }
        .control-row label {
            display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;
        }
        .control-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
        .badge {
            display: inline-block; background: var(--wrong-color); color: #fff;
            font-size: 11px; border-radius: 10px; padding: 1px 7px; margin-left: 2px;
        }
        .reset-btn {
            font-size: 12px; padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border); background: transparent; cursor: pointer;
        }
        @media (max-width: 480px) {
            .app { padding: 20px 14px; }
            .chinese-display { font-size: 30px; }
            .answer-display { font-size: 22px; }
            .lesson-grid { grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); }
            .stats { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>

var currentWord = null;
var pool = [];
var wrongSet = new Set();
var stats = { total: 0, correct: 0, streak: 0 };
var isAnswered = false;
var isMistakeMode = false;

function $(id) { return document.getElementById(id); }
var chineseEl = $('chinese-display');
var answerEl = $('answer-display');
var typeEl = $('type-display');
var inputEl = $('user-input');
var feedbackEl = $('feedback');
var btnSubmit = $('btn-submit');
var btnNext = $('btn-next');

function getSelectedLessons() {
    return Array.from(document.querySelectorAll('.lesson-cb:checked')).map(function(cb) { return cb.value; });
}

function updatePool() {
    if (isMistakeMode) {
        pool = Array.from(wrongSet);
    } else {
        var lessons = getSelectedLessons();
        pool = WORDS.filter(function(w) { return lessons.indexOf(w.l) !== -1; });
    }
    $('wrong-badge').textContent = wrongSet.size;
}

function pickWord() {
    if (pool.length === 0) return null;
    var w;
    do {
        w = pool[Math.floor(Math.random() * pool.length)];
    } while (w === currentWord && pool.length > 1);
    return w;
}

function start() {
    updatePool();
    if (pool.length === 0) {
        chineseEl.textContent = '没有单词可选';
        answerEl.textContent = '请选择至少一篇课文';
        inputEl.disabled = true;
        btnSubmit.disabled = true;
        btnSubmit.style.display = '';
        btnNext.style.display = 'none';
        currentWord = null;
        return;
    }
    currentWord = pickWord();
    if (!currentWord) {
        chineseEl.textContent = '--';
        return;
    }
    chineseEl.textContent = currentWord.c;
    answerEl.textContent = '';
    typeEl.textContent = '';
    inputEl.value = '';
    inputEl.disabled = false;
    inputEl.focus();
    btnSubmit.disabled = false;
    btnSubmit.style.display = '';
    btnNext.style.display = 'none';
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
    document.getElementById('app').className = 'app';
    isAnswered = false;
}

function submitAnswer() {
    if (isAnswered || !currentWord) return;
    var val = inputEl.value.trim();
    if (!val) return;
    isAnswered = true;
    inputEl.disabled = true;
    btnSubmit.disabled = true;

    stats.total++;
    var isCorrect = val === currentWord.k;

    if (isCorrect) {
        stats.correct++;
        stats.streak++;
        document.getElementById('app').classList.add('is-correct');
        feedbackEl.textContent = '\u2713 \u6b63\u786e\uff01';
        feedbackEl.className = 'feedback correct';
        wrongSet.delete(currentWord);
    } else {
        stats.streak = 0;
        wrongSet.add(currentWord);
        document.getElementById('app').classList.add('is-wrong');
        feedbackEl.textContent = '\u2717 \u9519\u8bef';
        feedbackEl.className = 'feedback wrong';
    }

    answerEl.textContent = currentWord.k + '  \u3000' + currentWord.j;
    typeEl.textContent = '[' + currentWord.t + ']  ' + currentWord.l;
    speak(currentWord.k);

    updateStats();
    $('wrong-badge').textContent = wrongSet.size;
    updatePool();

    btnSubmit.style.display = 'none';
    btnNext.style.display = '';
}

function updateStats() {
    $('stat-total').textContent = stats.total;
    $('stat-correct').textContent = stats.correct;
    var rate = stats.total === 0 ? 0 : Math.round((stats.correct / stats.total) * 100);
    $('stat-ratio').textContent = rate + '%';
    $('stat-streak').textContent = stats.streak;
}

function speak(text) {
    var audio = new Audio('https://translate.google.com/translate_tts?ie=UTF-8&client=gtx&tl=ja&q=' + encodeURIComponent(text));
    audio.play().catch(function() {
        // fallback: browser speech synthesis
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
            var msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ja-JP';
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }
    });
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        if (isAnswered) {
            e.preventDefault();
            start();
        } else if (currentWord) {
            e.preventDefault();
            submitAnswer();
        }
    }
});

btnSubmit.addEventListener('click', submitAnswer);
btnNext.addEventListener('click', start);

document.querySelectorAll('.lesson-cb').forEach(function(cb) {
    cb.addEventListener('change', function() {
        if (!isMistakeMode) start();
    });
});

$('btn-select-all').addEventListener('click', function() {
    var allChecked = Array.from(document.querySelectorAll('.lesson-cb')).every(function(cb) { return cb.checked; });
    document.querySelectorAll('.lesson-cb').forEach(function(cb) { cb.checked = !allChecked; });
    if (!isMistakeMode) start();
});

$('chk-mistake').addEventListener('change', function() {
    isMistakeMode = this.checked;
    document.querySelectorAll('.lesson-cb').forEach(function(cb) { cb.disabled = isMistakeMode; });
    $('btn-select-all').disabled = isMistakeMode;
    start();
});

$('btn-reset').addEventListener('click', function() {
    stats = { total: 0, correct: 0, streak: 0 };
    wrongSet = new Set();
    updateStats();
    $('wrong-badge').textContent = 0;
    start();
});

start();
</script>
</body>
</html>
